<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Colectivo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex&family=Space+Mono:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --white: #f5f0e8;
      --accent: #FF3B1F; --yellow: #F5E642;
      --green: #27ae60; --border: #1a1a1a;
      --surface: #111; --surface2: #0f0f0f;
      --muted: #888;
    }
    body { font-family: 'Google Sans Flex', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }

    /* ── NAV ── */
    nav { padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--black); z-index: 10; }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .nav-logo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; letter-spacing: 4px; color: var(--white); opacity: 0.4; text-decoration: none; }
    .nav-back { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #555; background: none; border: none; cursor: pointer; text-transform: uppercase; text-decoration: none; }
    .nav-back:hover { color: var(--white); }
    .nav-event { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #333; text-transform: uppercase; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .scan-btn { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--black); background: var(--white); padding: 8px 16px; text-decoration: none; font-weight: 700; text-transform: uppercase; transition: opacity 0.2s; }
    .scan-btn:hover { opacity: 0.8; }
    .edit-btn { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #555; background: none; border: 1px solid #222; padding: 7px 14px; text-decoration: none; text-transform: uppercase; transition: color 0.2s, border-color 0.2s; }
    .edit-btn:hover { color: var(--white); border-color: #444; }
    .last-update { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; color: #333; }

    /* ── MAIN ── */
    .main { padding: 28px 32px; display: flex; flex-direction: column; gap: 24px; }

    /* ── SECTION LABEL ── */
    .section-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: #333; text-transform: uppercase; margin-bottom: 12px; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 20px 24px; }
    .stat-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 44px; font-weight: 800; letter-spacing: -2px; color: var(--white); line-height: 1; }
    .stat-card.c-green .stat-value { color: var(--green); }
    .stat-card.c-yellow .stat-value { color: var(--yellow); }
    .stat-card.c-accent .stat-value { color: var(--accent); }
    .stat-sub { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; color: #333; margin-top: 6px; }

    /* ── REVENUE CARDS ── */
    .revenue-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
    .rev-card { background: var(--surface2); border: 1px solid var(--border); padding: 20px 24px; position: relative; overflow: hidden; }
    .rev-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .rev-card.c-white::before { background: #333; }
    .rev-card.c-yellow::before { background: var(--yellow); }
    .rev-card.c-red::before { background: var(--accent); }
    .rev-card.c-green::before { background: var(--green); }
    .rev-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 10px; }
    .rev-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--white); }
    .rev-card.c-yellow .rev-value { color: var(--yellow); }
    .rev-card.c-red .rev-value { color: var(--accent); }
    .rev-card.c-green .rev-value { color: var(--green); }
    .rev-sub { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; color: #333; margin-top: 6px; }

    /* ── TIER BREAKDOWN ── */
    .tiers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    .tiers-grid.tiers-2 { grid-template-columns: repeat(2, 1fr); }
    .tiers-grid.tiers-1 { grid-template-columns: repeat(1, 1fr); max-width: 400px; }
    .tiers-grid.tiers-4 { grid-template-columns: repeat(4, 1fr); }
    .tier-card { background: var(--surface2); border: 1px solid var(--border); padding: 24px; position: relative; overflow: hidden; }
    .tier-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .tier-card-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .tier-card-badge { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; padding: 4px 10px; text-transform: uppercase; font-weight: 700; }
    /* Tier color variants by index */
    .tier-c-0 .tier-card-name { color: var(--yellow); }
    .tier-c-0 .tier-card-badge { color: var(--black); background: var(--yellow); }
    .tier-c-0 .tier-sold-num { color: var(--yellow); }
    .tier-c-0 .progress-fill { background: var(--yellow); }
    .tier-c-1 .tier-card-name { color: var(--white); }
    .tier-c-1 .tier-card-badge { color: #444; border: 1px solid #333; }
    .tier-c-1 .tier-sold-num { color: var(--white); }
    .tier-c-1 .progress-fill { background: var(--white); }
    .tier-c-2 .tier-card-name { color: var(--accent); }
    .tier-c-2 .tier-card-badge { color: white; background: var(--accent); }
    .tier-c-2 .tier-sold-num { color: var(--accent); }
    .tier-c-2 .progress-fill { background: var(--accent); }
    .tier-c-3 .tier-card-name { color: var(--green); }
    .tier-c-3 .tier-card-badge { color: white; background: var(--green); }
    .tier-c-3 .tier-sold-num { color: var(--green); }
    .tier-c-3 .progress-fill { background: var(--green); }
    .tier-sold-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .tier-sold-num { font-size: 36px; font-weight: 800; letter-spacing: -2px; }
    .tier-capacity { font-family: 'Space Mono', monospace; font-size: 12px; color: #555; }
    .progress-track { background: #1a1a1a; height: 4px; margin-bottom: 16px; }
    .progress-fill { height: 100%; transition: width 0.5s ease; }
    .tier-meta { display: flex; flex-direction: column; gap: 6px; }
    .tier-meta-row { display: flex; justify-content: space-between; align-items: center; }
    .tier-meta-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #444; text-transform: uppercase; }
    .tier-meta-value { font-family: 'Space Mono', monospace; font-size: 12px; color: #888; }
    .tier-meta-value.highlight { color: var(--white); font-weight: 700; }

    /* ── TABLE ── */
    .controls { display: flex; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; }
    .search-wrap input { width: 100%; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); font-size: 14px; color: var(--white); outline: none; font-family: 'Google Sans Flex', sans-serif; transition: border-color 0.15s; }
    .search-wrap input:focus { border-color: #333; }
    .search-wrap input::placeholder { color: #333; }
    .refresh-btn { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #444; background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; cursor: pointer; text-transform: uppercase; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
    .refresh-btn:hover { color: var(--white); border-color: #333; }
    .table-wrap { border: 1px solid var(--border); overflow-x: auto; margin-top: 12px; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); border-bottom: 1px solid var(--border); }
    thead th { padding: 12px 16px; text-align: left; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #333; text-transform: uppercase; font-weight: 400; }
    tbody tr { border-bottom: 1px solid #0e0e0e; cursor: pointer; transition: background 0.1s; }
    tbody tr:hover { background: #0e0e0e; }
    tbody td { padding: 12px 16px; font-size: 13px; color: #666; }
    tbody td strong { color: #aaa; }
    .tier-pill { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; padding: 3px 8px; text-transform: uppercase; font-weight: 700; display: inline-block; }
    .tier-pill-0 { color: var(--black); background: var(--yellow); }
    .tier-pill-1 { color: #555; border: 1px solid #333; }
    .tier-pill-2 { color: white; background: var(--accent); }
    .tier-pill-3 { color: white; background: var(--green); }
    .badge-in { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 3px 8px; font-size: 9px; font-weight: 700; letter-spacing: 2px; font-family: 'Space Mono', monospace; text-transform: uppercase; }
    .badge-out { background: transparent; border: 1px solid #222; color: #333; padding: 3px 8px; font-size: 9px; font-weight: 700; letter-spacing: 2px; font-family: 'Space Mono', monospace; text-transform: uppercase; }
    .empty { text-align: center; padding: 60px; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #222; }
    .row-hint { font-family: 'Space Mono', monospace; font-size: 10px; color: #1f1f1f; letter-spacing: 2px; margin-top: 8px; text-align: right; }

    /* ── DETAIL MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(8,8,8,0.93); align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid #222; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 24px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
    .modal-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
    .modal-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--white); }
    .modal-close { background: none; border: none; color: #444; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; transition: color 0.15s; }
    .modal-close:hover { color: var(--white); }
    .modal-body { padding: 24px 28px; }
    .detail-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: baseline; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #444; text-transform: uppercase; min-width: 90px; flex-shrink: 0; }
    .detail-value { font-size: 14px; color: var(--white); word-break: break-all; }
    .detail-value.muted { color: #555; }
    .green { color: var(--green); }
    .red { color: var(--accent); }
    .ticket-id-box { background: var(--surface2); border: 1px solid var(--border); padding: 10px 14px; margin-top: 4px; font-family: 'Space Mono', monospace; font-size: 11px; color: #555; word-break: break-all; }
    /* ── TICKET LIST IN MODAL ── */
    .ticket-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .ticket-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; user-select: none; }
    .ticket-item:hover { border-color: #333; }
    .ticket-item.selected { border-color: var(--accent); }
    .ticket-checkbox { width: 16px; height: 16px; border: 1px solid #444; background: var(--black); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
    .ticket-item.selected .ticket-checkbox { background: var(--accent); border-color: var(--accent); }
    .ticket-checkbox::after { content: ''; display: none; width: 8px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white; transform: rotate(-45deg) translate(1px, -1px); }
    .ticket-item.selected .ticket-checkbox::after { display: block; }
    .ticket-item-info { flex: 1; min-width: 0; }
    .ticket-item-id { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ticket-item-status { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; margin-top: 3px; }
    .ticket-item-status.in { color: var(--green); }
    .ticket-item-status.out { color: #333; }
    .ticket-select-all { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #444; background: none; border: none; cursor: pointer; padding: 0; margin-top: 6px; text-transform: uppercase; text-align: left; }
    .ticket-select-all:hover { color: var(--white); }
    .modal-actions { padding: 20px 28px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .btn-resend { flex: 1; padding: 13px; background: var(--accent); color: white; border: none; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Google Sans Flex', sans-serif; transition: opacity 0.2s; }
    .btn-resend:hover { opacity: 0.85; }
    .btn-resend:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cancel { padding: 13px 20px; background: transparent; color: #555; border: 1px solid #222; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Google Sans Flex', sans-serif; transition: color 0.2s, border-color 0.2s; }
    .btn-cancel:hover { color: var(--white); border-color: #444; }
    .resend-feedback { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-align: center; padding: 10px 28px; display: none; }
    .resend-feedback.ok { color: var(--green); }
    .resend-feedback.err { color: var(--accent); }

    /* ── ERROR / LOADING ── */
    .loading-text { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #444; padding: 80px 0; text-align: center; }
    .error-text { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); padding: 80px 0; text-align: center; }

    @media (max-width: 900px) {
      .stats-grid, .revenue-grid { grid-template-columns: repeat(2, 1fr); }
      .tiers-grid, .tiers-grid.tiers-2, .tiers-grid.tiers-4 { grid-template-columns: 1fr; }
      .main { padding: 20px; }
      nav { padding: 14px 20px; }
      .nav-event, .last-update { display: none; }
      .stat-value { font-size: 32px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a class="nav-logo" href="/events">COLECTIVO</a>
      <span class="nav-event" id="nav-event">// Cargando...</span>
    </div>
    <div class="nav-right">
      <span class="last-update" id="last-update"></span>
      <a class="edit-btn" id="btn-edit" href="#">✏️ Editar</a>
      <a class="scan-btn" id="btn-scan" href="#">Escanear puerta →</a>
    </div>
  </nav>

  <div id="main-content">
    <div class="main">
      <div class="loading-text" id="loading-msg">Cargando datos del evento...</div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div>
          <div class="modal-tag" id="modal-tag">// Boleto</div>
          <div class="modal-name" id="modal-name">—</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="resend-feedback" id="resend-feedback"></div>
      <div class="modal-actions">
        <button class="btn-resend" id="btn-resend" onclick="resendQR()">Reenviar QR por email →</button>
        <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://api.colectivo.live';
    const token = localStorage.getItem('cl_token');
    if (!token) window.location.href = '/login';

    const slug = new URLSearchParams(window.location.search).get('slug');
    if (!slug) {
      document.getElementById('loading-msg').className = 'error-text';
      document.getElementById('loading-msg').textContent = 'Error: slug no proporcionado.';
    }

    let allData = [];
    let renderedData = [];
    let activeEmail = '';
    let currentSlug = slug;

    // Set up nav links
    document.getElementById('btn-edit').href = `/create-event?edit=${slug}`;
    document.getElementById('btn-scan').href = `/scan?slug=${slug}`;

    // ── HELPERS ───────────────────────────────────────────────────
    function mxn(n) {
      return '$' + Math.round(n).toLocaleString('es-MX') + ' MXN';
    }
    function mxnShort(n) {
      if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return '$' + Math.round(n / 1000) + 'K';
      return '$' + Math.round(n).toLocaleString('es-MX');
    }

    // Assign tier color index based on tier order
    const TIER_COLORS = ['tier-pill-0', 'tier-pill-1', 'tier-pill-2', 'tier-pill-3'];
    let tierIndexMap = {};

    // ── LOAD DATA ─────────────────────────────────────────────────
    async function loadData() {
      try {
        const res = await fetch(`${API}/v2/admin/events/${slug}/stats`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (res.status === 401 || res.status === 403) {
          localStorage.removeItem('cl_token');
          localStorage.removeItem('cl_user');
          window.location.href = '/login';
          return;
        }
        if (!res.ok) throw new Error('Error al cargar datos');
        const data = await res.json();
        allData = data.registrations || [];

        // Build tier index map for consistent colors
        (data.tiers || []).forEach((t, i) => {
          tierIndexMap[t.label] = i;
        });

        renderDashboard(data);
        document.getElementById('last-update').textContent =
          'Actualizado ' + new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      } catch (err) {
        document.getElementById('main-content').innerHTML =
          `<div class="main"><div class="error-text">Error al cargar datos del evento.</div></div>`;
      }
    }

    // ── RENDER ────────────────────────────────────────────────────
    function renderDashboard(data) {
      const { event, stats, tiers, registrations } = data;

      // Update nav
      document.getElementById('nav-event').textContent = `// ${event.name}`;
      document.title = `${event.name} — Admin`;

      // Compute check-in counts
      const checkedIn = registrations.filter(r => r.checked_in).length;
      const pending = registrations.length - checkedIn;
      const checkinPct = registrations.length > 0 ? Math.round((checkedIn / registrations.length) * 100) : 0;
      const fillPct = stats.fillRate || 0;

      // Build per-tier checkin counts
      const tierCheckin = {};
      (tiers || []).forEach(t => { tierCheckin[t.label] = 0; });
      registrations.forEach(r => {
        if (r.checked_in && r.student_name) {
          for (const t of (tiers || [])) {
            if (r.student_name.includes(t.label)) {
              tierCheckin[t.label] = (tierCheckin[t.label] || 0) + 1;
              break;
            }
          }
        }
      });

      // Revenue calcs (6% commission, Stripe ~3.6% + $3.50/ticket)
      let gross = 0, commission = 0, stripeEst = 0;
      (tiers || []).forEach(t => {
        const charged = Math.round(t.price * 1.06);
        const fee = t.price * 0.06;
        const stripe = charged * 0.036 + 3.50;
        gross += charged * t.sold;
        commission += fee * t.sold;
        stripeEst += stripe * t.sold;
      });
      const net = commission - stripeEst;

      // Determine tiers grid class
      const tierCount = (tiers || []).length;
      let tiersGridClass = 'tiers-grid';
      if (tierCount === 1) tiersGridClass += ' tiers-1';
      else if (tierCount === 2) tiersGridClass += ' tiers-2';
      else if (tierCount >= 4) tiersGridClass += ' tiers-4';

      document.getElementById('main-content').innerHTML = `
        <div class="main">

          <!-- ASISTENCIA -->
          <div>
            <div class="section-label">// Asistencia</div>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">Boletos vendidos</div>
                <div class="stat-value">${stats.totalSold}</div>
                <div class="stat-sub">${fillPct}% del aforo total</div>
              </div>
              <div class="stat-card c-green">
                <div class="stat-label">Ingresaron</div>
                <div class="stat-value">${checkedIn}</div>
                <div class="stat-sub">${checkinPct}% de vendidos</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Pendientes</div>
                <div class="stat-value">${pending}</div>
              </div>
              <div class="stat-card c-yellow">
                <div class="stat-label">% Ingreso</div>
                <div class="stat-value">${checkinPct}%</div>
              </div>
            </div>
          </div>

          <!-- INGRESOS -->
          <div>
            <div class="section-label">// Ingresos · estimado</div>
            <div class="revenue-grid">
              <div class="rev-card c-white">
                <div class="rev-label">Total recaudado</div>
                <div class="rev-value">${mxnShort(gross)}</div>
                <div class="rev-sub">Cobrado a clientes</div>
              </div>
              <div class="rev-card c-yellow">
                <div class="rev-label">Comisión Colectivo</div>
                <div class="rev-value">${mxnShort(commission)}</div>
                <div class="rev-sub">6% sobre precio base</div>
              </div>
              <div class="rev-card c-red">
                <div class="rev-label">Cargos Stripe</div>
                <div class="rev-value">${mxnShort(stripeEst)}</div>
                <div class="rev-sub">3.6% + $3.50 / boleto est.</div>
              </div>
              <div class="rev-card c-green">
                <div class="rev-label">Neto Colectivo</div>
                <div class="rev-value">${mxnShort(net < 0 ? 0 : net)}</div>
                <div class="rev-sub">Comisión menos Stripe</div>
              </div>
            </div>
          </div>

          <!-- TIERS -->
          ${tierCount > 0 ? `
          <div>
            <div class="section-label">// Boletos por tier</div>
            <div class="${tiersGridClass}">
              ${(tiers || []).map((t, i) => {
                const colorIdx = Math.min(i, 3);
                const pct = t.capacity > 0 ? Math.min(Math.round((t.sold / t.capacity) * 100), 100) : 0;
                const tierIn = tierCheckin[t.label] || 0;
                return `
                  <div class="tier-card tier-c-${colorIdx}">
                    <div class="tier-card-header">
                      <div class="tier-card-name">${t.label.toUpperCase()}</div>
                      <div class="tier-card-badge">${mxn(t.price)}</div>
                    </div>
                    <div class="tier-sold-row">
                      <div class="tier-sold-num">${t.sold}</div>
                      <div class="tier-capacity">/ ${t.capacity}</div>
                    </div>
                    <div class="progress-track">
                      <div class="progress-fill" style="width:${pct}%"></div>
                    </div>
                    <div class="tier-meta">
                      <div class="tier-meta-row">
                        <span class="tier-meta-label">Recaudado</span>
                        <span class="tier-meta-value highlight">${mxn(t.sold * t.price)}</span>
                      </div>
                      <div class="tier-meta-row">
                        <span class="tier-meta-label">Ingresaron</span>
                        <span class="tier-meta-value">${tierIn} de ${t.sold}</span>
                      </div>
                      <div class="tier-meta-row">
                        <span class="tier-meta-label">Aforo</span>
                        <span class="tier-meta-value">${pct}% vendido</span>
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
          ` : ''}

          <!-- TABLE -->
          <div>
            <div class="controls">
              <div class="search-wrap">
                <input type="text" id="search" placeholder="Buscar nombre, tier, teléfono o correo..." oninput="filterTable()" />
              </div>
              <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Tier</th>
                    <th>Correo</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                  </tr>
                </thead>
                <tbody id="table-body">
                  <tr><td colspan="5" class="empty">Cargando...</td></tr>
                </tbody>
              </table>
            </div>
            <p class="row-hint">// Toca un registro para ver detalles y reenviar QR</p>
          </div>

        </div>
      `;

      renderTable(allData);
    }

    // ── TABLE ──────────────────────────────────────────────────────
    function getTierPill(studentName) {
      if (!studentName) return `<span class="tier-pill tier-pill-1">—</span>`;
      for (const [label, idx] of Object.entries(tierIndexMap)) {
        if (studentName.includes(label)) {
          const colorIdx = Math.min(idx, 3);
          const shortLabel = label.length > 12 ? label.substring(0, 10) + '…' : label;
          return `<span class="tier-pill tier-pill-${colorIdx}">${shortLabel}</span>`;
        }
      }
      const raw = studentName.split(' — ')[0] || studentName;
      return `<span class="tier-pill tier-pill-1">${raw}</span>`;
    }

    function renderTable(data) {
      renderedData = data;
      const tbody = document.getElementById('table-body');
      if (!tbody) return;
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">SIN REGISTROS AÚN</td></tr>';
        return;
      }
      tbody.innerHTML = data.map((r, i) => `
        <tr onclick="showDetail(${i})">
          <td><strong>${r.name || '—'}</strong></td>
          <td>${getTierPill(r.student_name)}</td>
          <td style="color:#555">${r.email || '—'}</td>
          <td style="color:#444;font-family:'Space Mono',monospace;font-size:11px">${
            r.created_at
              ? new Date(r.created_at).toLocaleDateString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
              : '—'
          }</td>
          <td>${r.checked_in
            ? `<span class="badge-in">✓ Ingresó</span>`
            : `<span class="badge-out">Pendiente</span>`
          }</td>
        </tr>
      `).join('');
    }

    function filterTable() {
      const q = (document.getElementById('search')?.value || '').toLowerCase();
      const filtered = allData.filter(r =>
        (r.name || '').toLowerCase().includes(q) ||
        (r.student_name || '').toLowerCase().includes(q) ||
        (r.email || '').toLowerCase().includes(q) ||
        (r.phone || '').toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    // ── DETAIL MODAL ──────────────────────────────────────────────
    let modalTickets = []; // all tickets for current order

    function showDetail(index) {
      const r = renderedData[index];
      if (!r) return;
      activeEmail = r.email;

      modalTickets = allData.filter(x => x.email === r.email);
      const totalTickets = modalTickets.length;
      const checkedCount = modalTickets.filter(x => x.checked_in).length;

      document.getElementById('modal-tag').textContent =
        totalTickets > 1 ? `// ${totalTickets} boletos · ${checkedCount} ingresaron` : '// 1 boleto';
      document.getElementById('modal-name').textContent = r.name || '—';

      const checkinTime = r.checked_in_at
        ? new Date(r.checked_in_at).toLocaleString('es-MX', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
        : null;

      document.getElementById('modal-body').innerHTML = `
        <div class="detail-row">
          <span class="detail-label">Email</span>
          <span class="detail-value">${r.email || '—'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">WhatsApp</span>
          <span class="detail-value ${r.phone ? '' : 'muted'}">${r.phone || 'No capturado'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Tier</span>
          <span class="detail-value">${r.student_name || '—'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Compra</span>
          <span class="detail-value">${r.created_at ? new Date(r.created_at).toLocaleString('es-MX', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' }) : '—'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Estado</span>
          <span class="detail-value">${r.checked_in
            ? `<span class="green">✓ Ingresó${checkinTime ? ` · ${checkinTime}` : ''}</span>`
            : '<span class="red">Pendiente</span>'
          }</span>
        </div>
        ${totalTickets > 1 ? `
        <div class="detail-row">
          <span class="detail-label">Orden</span>
          <span class="detail-value">${checkedCount} / ${totalTickets} boletos escaneados</span>
        </div>` : ''}
        <div class="detail-row" style="flex-direction:column;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="detail-label">Boletos</span>
            ${totalTickets > 1 ? `<button class="ticket-select-all" onclick="toggleSelectAll()">Seleccionar todos</button>` : ''}
          </div>
          <div class="ticket-list" id="ticket-list">
            ${modalTickets.map((t, i) => {
              const tCheckinTime = t.checked_in_at
                ? new Date(t.checked_in_at).toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' })
                : null;
              return `
              <div class="ticket-item" id="ticket-item-${i}" onclick="toggleTicket(${i})">
                <div class="ticket-checkbox"></div>
                <div class="ticket-item-info">
                  <div class="ticket-item-id">${t.id}</div>
                  <div class="ticket-item-status ${t.checked_in ? 'in' : 'out'}">
                    ${t.checked_in ? `✓ Ingresó${tCheckinTime ? ' · ' + tCheckinTime : ''}` : '⬤ Pendiente'}
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `;

      updateResendButton();
      document.getElementById('resend-feedback').style.display = 'none';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function toggleTicket(index) {
      const el = document.getElementById(`ticket-item-${index}`);
      if (el) {
        el.classList.toggle('selected');
        updateResendButton();
      }
    }

    function toggleSelectAll() {
      const items = document.querySelectorAll('.ticket-item');
      const allSelected = [...items].every(el => el.classList.contains('selected'));
      items.forEach(el => allSelected ? el.classList.remove('selected') : el.classList.add('selected'));
      updateResendButton();
    }

    function getSelectedTicketIds() {
      const selected = document.querySelectorAll('.ticket-item.selected');
      return [...selected].map(el => {
        const idx = parseInt(el.id.replace('ticket-item-', ''));
        return modalTickets[idx]?.id;
      }).filter(Boolean);
    }

    function updateResendButton() {
      const btn = document.getElementById('btn-resend');
      const selected = getSelectedTicketIds();
      const total = modalTickets.length;
      if (selected.length === 0) {
        btn.disabled = true;
        btn.textContent = total === 1 ? 'Reenviar QR por email →' : 'Selecciona boletos para reenviar';
        if (total === 1) btn.disabled = false;
      } else {
        btn.disabled = false;
        btn.textContent = selected.length === 1
          ? 'Reenviar 1 QR por email →'
          : `Reenviar ${selected.length} QRs por email →`;
      }
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
    function closeModalOnBg(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

    // ── RESEND QR ─────────────────────────────────────────────────
    async function resendQR() {
      const btn = document.getElementById('btn-resend');
      const feedback = document.getElementById('resend-feedback');

      // Determine which tickets to send
      const selectedIds = getSelectedTicketIds();
      // If none selected and only 1 ticket, send all (the one ticket)
      const ticketIds = selectedIds.length > 0 ? selectedIds : null;

      btn.disabled = true;
      btn.textContent = 'Enviando...';
      feedback.style.display = 'none';

      try {
        const res = await fetch(`${API}/v2/admin/events/${currentSlug}/resend-email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ email: activeEmail, ticketIds })
        });
        const data = await res.json();
        if (res.ok) {
          const qty = data.qty || (ticketIds ? ticketIds.length : modalTickets.length);
          feedback.textContent = `✓ ${qty === 1 ? '1 QR' : qty + ' QRs'} reenviados a ${activeEmail}`;
          feedback.className = 'resend-feedback ok';
          feedback.style.display = 'block';
          btn.textContent = 'Enviado ✓';
        } else {
          throw new Error(data.error || 'Error');
        }
      } catch (err) {
        feedback.textContent = `✗ ${err.message}`;
        feedback.className = 'resend-feedback err';
        feedback.style.display = 'block';
        btn.disabled = false;
        updateResendButton();
      }
    }

    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);

    // Init
    if (slug) loadData();
  </script>

</body>
</html>
