<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Escanear — Colectivo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex&family=Space+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --white: #f5f0e8;
      --accent: #FF3B1F; --yellow: #F5E642;
      --green: #27ae60; --border: #1a1a1a;
    }
    body { font-family: 'Google Sans Flex', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── SETUP SCREEN ── */
    .setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .setup-card { background: #111; border: 1px solid #222; padding: 40px 32px; max-width: 400px; width: 100%; }
    .setup-logo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; letter-spacing: 4px; color: var(--white); opacity: 0.3; margin-bottom: 32px; display: block; }
    .setup-tag { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
    .setup-card h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 4px; }
    .setup-event { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #444; margin-bottom: 32px; }
    .setup-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .setup-input { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1px solid #222; font-size: 14px; color: var(--white); outline: none; font-family: 'Google Sans Flex', sans-serif; margin-bottom: 24px; transition: border-color 0.15s; }
    .setup-input:focus { border-color: #444; }
    .setup-input::placeholder { color: #333; }
    .setup-btn { width: 100%; padding: 16px; background: var(--white); color: var(--black); border: none; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Google Sans Flex', sans-serif; transition: opacity 0.2s; }
    .setup-btn:hover { opacity: 0.85; }
    .setup-error { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--accent); margin-top: 12px; display: none; }

    /* ── SCANNER SCREEN ── */
    .scanner-screen { display: none; flex-direction: column; min-height: 100vh; }
    .scan-nav { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--black); position: sticky; top: 0; z-index: 10; }
    .scan-nav-left { display: flex; flex-direction: column; gap: 2px; }
    .scan-nav-logo { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--white); opacity: 0.3; }
    .scan-nav-event { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #333; text-transform: uppercase; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scan-station { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #444; background: #111; border: 1px solid #222; padding: 6px 12px; }
    .scan-count-wrap { display: flex; gap: 16px; align-items: center; }
    .scan-count-item { text-align: center; }
    .scan-count-num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: -1px; }
    .scan-count-num.c-green { color: var(--green); }
    .scan-count-label { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #333; text-transform: uppercase; }

    /* ── CAMERA ── */
    .camera-wrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; min-height: 300px; }
    #video { width: 100%; max-height: 60vh; object-fit: cover; display: block; }
    #canvas { display: none; }
    .scan-frame { position: absolute; width: 220px; height: 220px; pointer-events: none; }
    .scan-frame::before, .scan-frame::after,
    .scan-frame-inner::before, .scan-frame-inner::after {
      content: ''; position: absolute; width: 32px; height: 32px;
    }
    .scan-frame::before  { top: 0; left: 0;    border-top: 2px solid var(--white);    border-left: 2px solid var(--white); }
    .scan-frame::after   { top: 0; right: 0;   border-top: 2px solid var(--white);    border-right: 2px solid var(--white); }
    .scan-frame-inner::before { bottom: 0; left: 0;  border-bottom: 2px solid var(--white); border-left: 2px solid var(--white); }
    .scan-frame-inner::after  { bottom: 0; right: 0; border-bottom: 2px solid var(--white); border-right: 2px solid var(--white); }
    .scan-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; white-space: nowrap; }

    /* ── RESULT OVERLAY ── */
    .result-overlay { display: none; position: fixed; inset: 0; z-index: 50; align-items: center; justify-content: center; flex-direction: column; gap: 16px; padding: 32px; text-align: center; transition: background 0.2s; }
    .result-overlay.show { display: flex; }
    .result-overlay.ok    { background: rgba(39, 174, 96, 0.97); }
    .result-overlay.warn  { background: rgba(245, 230, 66, 0.97); }
    .result-overlay.fail  { background: rgba(255, 59, 31, 0.97); }
    .result-icon { font-size: 72px; line-height: 1; }
    .result-status { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; }
    .result-name { font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--black); }
    .result-detail { font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 2px; color: rgba(0,0,0,0.5); }
    .result-overlay.ok    .result-name,
    .result-overlay.ok    .result-status { color: var(--black); }
    .result-overlay.warn  .result-name,
    .result-overlay.warn  .result-status { color: var(--black); }
    .result-overlay.fail  .result-name,
    .result-overlay.fail  .result-status { color: var(--white); }
    .result-overlay.fail  .result-detail  { color: rgba(255,255,255,0.5); }
    .result-dismiss { margin-top: 8px; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; padding: 12px 24px; background: rgba(0,0,0,0.15); border: 1px solid rgba(0,0,0,0.2); color: inherit; cursor: pointer; text-transform: uppercase; }

    /* ── NO CAMERA ── */
    .no-camera { text-align: center; padding: 48px 24px; }
    .no-camera p { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; color: #444; }
  </style>
</head>
<body>

  <!-- Setup Screen -->
  <div class="setup-screen" id="setup-screen">
    <div class="setup-card">
      <span class="setup-logo">COLECTIVO</span>
      <div class="setup-tag">// Escaneo de puerta</div>
      <h1 id="setup-event-name">Cargando...</h1>
      <p class="setup-event" id="setup-event-sub"></p>
      <label class="setup-label">Nombre de estación (opcional)</label>
      <input class="setup-input" type="text" id="station-input" placeholder="Ej: Puerta principal, Entrada VIP..." maxlength="40" />
      <button class="setup-btn" onclick="startScanner()">Abrir cámara →</button>
      <p class="setup-error" id="setup-error"></p>
    </div>
  </div>

  <!-- Scanner Screen -->
  <div class="scanner-screen" id="scanner-screen">
    <nav class="scan-nav">
      <div class="scan-nav-left">
        <span class="scan-nav-logo">COLECTIVO</span>
        <span class="scan-nav-event" id="nav-event-name"></span>
      </div>
      <div class="scan-count-wrap">
        <div class="scan-count-item">
          <div class="scan-count-num c-green" id="count-ok">0</div>
          <div class="scan-count-label">Ingresaron</div>
        </div>
        <div class="scan-count-item">
          <div class="scan-count-num" id="count-total">0</div>
          <div class="scan-count-label">Escaneados</div>
        </div>
      </div>
    </nav>

    <div class="camera-wrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-frame"><div class="scan-frame-inner"></div></div>
      <div class="scan-hint">Apunta al código QR del boleto</div>
    </div>
  </div>

  <!-- Result Overlay -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-status" id="result-status"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-detail" id="result-detail"></div>
    <button class="result-dismiss" onclick="dismissResult()">Siguiente →</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script>
    const API = 'https://api.colectivo.live';
    const slug = new URLSearchParams(window.location.search).get('slug');
    let stationName = '';
    let scanning = false;
    let lastScanned = '';
    let lastScannedAt = 0;
    let countOk = 0, countTotal = 0;
    let animFrame = null;

    if (!slug) {
      document.getElementById('setup-event-name').textContent = 'Slug requerido';
      document.getElementById('setup-event-sub').textContent = '// Agrega ?slug=nombre-evento a la URL';
    } else {
      loadEvent();
    }

    async function loadEvent() {
      try {
        const res = await fetch(`${API}/events/${slug}`);
        if (!res.ok) throw new Error();
        const ev = await res.json();
        document.getElementById('setup-event-name').textContent = ev.name || slug;
        document.getElementById('setup-event-sub').textContent = ev.date_label ? `// ${ev.date_label}` : `// ${slug}`;
        document.getElementById('nav-event-name').textContent = `// ${ev.name || slug}`;
        document.title = `Escanear · ${ev.name || slug}`;
      } catch {
        document.getElementById('setup-event-name').textContent = slug;
        document.getElementById('nav-event-name').textContent = `// ${slug}`;
      }
    }

    async function startScanner() {
      if (!slug) return;
      stationName = document.getElementById('station-input').value.trim();

      const errEl = document.getElementById('setup-error');
      errEl.style.display = 'none';

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('scanner-screen').style.display = 'flex';
        scanning = true;
        requestAnimationFrame(tick);
      } catch (err) {
        errEl.textContent = 'No se pudo acceder a la cámara. Verifica los permisos.';
        errEl.style.display = 'block';
      }
    }

    function tick() {
      if (!scanning) return;
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
        if (code) {
          const now = Date.now();
          // Debounce — don't re-scan same code within 4 seconds
          if (code.data !== lastScanned || now - lastScannedAt > 4000) {
            lastScanned = code.data;
            lastScannedAt = now;
            handleScan(code.data);
          }
        }
      }
      animFrame = requestAnimationFrame(tick);
    }

    async function handleScan(ticketId) {
      scanning = false;
      if (animFrame) cancelAnimationFrame(animFrame);

      try {
        const res = await fetch(`${API}/v2/scan/${slug}/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: ticketId, station: stationName })
        });
        const data = await res.json();

        countTotal++;
        document.getElementById('count-total').textContent = countTotal;

        if (data.status === 'success') {
          countOk++;
          document.getElementById('count-ok').textContent = countOk;
          showResult('ok', '✓', '¡Acceso válido!',
            data.registration?.name || '',
            data.registration?.student_name || ''
          );
        } else if (data.status === 'already_checked_in') {
          showResult('warn', '⚠', 'Ya ingresó',
            data.registration?.name || '',
            data.registration?.checked_in_at
              ? `Ingresó a las ${new Date(data.registration.checked_in_at).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}`
              : 'Ya registrado'
          );
        } else if (data.status === 'wrong_event') {
          showResult('fail', '✕', 'Evento incorrecto',
            'Boleto de otro evento',
            data.message || ''
          );
        } else {
          showResult('fail', '✕', 'No válido',
            'Boleto no encontrado',
            ticketId.substring(0, 16) + '...'
          );
        }
      } catch (err) {
        showResult('fail', '✕', 'Error de conexión', 'Intenta de nuevo', '');
      }
    }

    function showResult(type, icon, status, name, detail) {
      const overlay = document.getElementById('result-overlay');
      overlay.className = `result-overlay show ${type}`;
      document.getElementById('result-icon').textContent = icon;
      document.getElementById('result-status').textContent = status;
      document.getElementById('result-name').textContent = name;
      document.getElementById('result-detail').textContent = detail;

      // Auto-dismiss after 3 seconds for success
      if (type === 'ok') {
        setTimeout(dismissResult, 2500);
      }
    }

    function dismissResult() {
      document.getElementById('result-overlay').className = 'result-overlay';
      scanning = true;
      lastScanned = '';
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
